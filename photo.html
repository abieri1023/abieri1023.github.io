<!DOCTYPE html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>一些照片</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=0">
    <link rel="shortcut icon" href="home.ico">
    <style>
        @media (min-width: 0px) and (max-width:350px) {
            .div1 {
                width: 350px;
                height: 85px;
                border-radius: 8px;
                background-color: #cfe6f7;
            }
        }

        @media (min-width: 350px) and (max-width:500px) {
            .div1 {
                width: auto;
                height: 85px;
                border-radius: 8px;
                background-color: #cfe6f7;
            }
        }

        @media (min-width: 500px) {
            .div1 {
                width: 350px;
                height: 85px;
                border-radius: 8px;
                background-color: #cfe6f7;
            }
        }
    </style>
    <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_3881267_wfv3iyzbijg.css">
</head>

<body>
    <div class="div1">
        <div style="width: auto;border: 1px solid green;text-align:center;border-radius: 10px;">
            <div style="height: 60px;display: flex;align-items: center;
        justify-content: center;font-size: 30px;">
                <font style="color: #095eb3; background-color: #b3d2ee;
                border-radius: 8px;padding-left: 30px;padding-right: 30px;">一些照片</font>
            </div>
            <button id="closeButton" style="font-size: 20px;width: 80px;">关闭</button>
            <div style="width: auto;text-align: left;">
                <strong>一、我的照片</strong><br>
                <section>
                    <span class="left iconfont icon-anniu_jiantouxiangzuo"></span>
                    <img style="width: 100%;height: 100%;" src="./img/1.jpg" alt="" id="img">
                    <span class="right iconfont icon-anniu-jiantouxiangyou"></span>
                    <p></p>
                </section>
                <strong>二、其他照片</strong><br>
                <div id="wrap">
                    <ul class="imgs">
                        <li class="active"><img style="width: 100%;height: 100%;" src="./img/1.jpg" /></li>
                        <li><img style="width: 100%;height: 100%;" src="./img/2.jpg" /></li>
                        <li><img style="width: 100%;height: 100%" src="img/3.jpg" /></li>
                        <li><img style="width: 100%;height: 100%" src="img/4.jpg" /></li>
                    </ul>
                    <ul class="lrbtn">
                        <li><span class="left iconfont icon-anniu_jiantouxiangzuo"></span></li>
                        <li><span class="right iconfont icon-anniu-jiantouxiangyou"></span></li>
                    </ul>
                    <ul class="btn">
                        <li class="on"></li>
                        <li></li>
                        <li></li>
                        <li></li>
                    </ul>
                </div>
                <hr>
            </div>
        </div>
</body>
<style>
    li {
        margin-left: -40px;
    }

    #wrap {
        position: relative;
        /*容器盒子都是设为相对定位*/
        width: auto;
        height: 200px;
    }

    /*图前面的小点和箭头去掉*/
    #wrap ul {
        list-style: none;
    }

    /*将图片都叠加到一块(布局)*/
    #wrap .imgs li {
        position: absolute;
        /*所有图片居中集合*/
        display: none;
    }

    /*当前活动图的展示*/
    #wrap .imgs li.active {
        display: block;
    }

    /*左右按钮的布局*/
    #wrap .lrbtn li {
        position: absolute;
        top: 50%;
        /*垂直布局*/
        margin-top: -40px;
        /*相对居中*/
        width: 40px;
        height: 80px;
        /*背景色*/
        opacity: 0.5;
        /*透明度*/
        line-height: 80px;
        /*小箭头垂直居中，行高设置与按钮同高就可以*/

    }

    #wrap .lrbtn li:last-child {
        right: 0;
    }

    /*轮播按钮的布局设计*/
    #wrap .btn {
        position: absolute;
        bottom: 10px;
        left: 0;
        right: 50px;
        margin: auto;
        display: flex;
        width: 210px;
        height: 30px;
        border-radius: 20px;
    }

    #wrap .btn li {
        width: 20px;
        height: 20px;
        flex: 1;
        border-radius: 10px;
        background-color: rgb(207, 207, 207);
        margin: 5px;
    }

    #wrap .btn li.on {
        background-color: #ffffff;
    }

    button {
        background-color: #6ab0f6;
        color: white;
        height: 40px;
        border: 0;
        font-size: 16px;
        box-sizing: content-box;
        border-radius: 8px;
    }

    button:hover {
        background-color: #5ba9f7
    }

    /* 轮播图用 */
    section {
        position: relative;
        height: 100%;
        width: auto;
        margin: 10px auto;
    }

    #img {
        height: 100%;
        width: auto;
        background-size: 100% 100%;
    }

    p {
        position: absolute;
        left: 50%;
        bottom: 0px;
        transform: translate(-50%, -50%);
    }

    i {
        height: 15px;
        width: 15px;
        background-color: rgb(188, 188, 188);
        border-radius: 50%;
        display: inline-block;
        margin-right: 10px;
    }

    i:nth-child(1) {
        background-color: white;
    }

    i:nth-child(4) {
        margin-right: 0;
    }

    .left,
    .right {
        color: rgba(255, 254, 254, 0.7);
        font-size: 50px;
        font-weight: bolder;
        position: absolute;
        top: 50%;
        font-weight: 500;
    }

    .left {
        left: 0px;
        transform: translate(15%, -50%);
    }

    .right {
        right: 0px;
        transform: translate(-15%, -50%);
    }
</style>
<script>
    //图片自动轮播方法


    //下方焦点切换方法
    var curIndex = 0;
    var imgs = document.querySelectorAll("#wrap .imgs li")
    var btns = document.querySelectorAll("#wrap .btn li")

    /*测试输出*/
    // console.log(btns,imgs)

    for (let i = 0; i < btns.length; i++) {
        btns[i].index = i
        btns[i].onclick = start

    }
    function start() {
        curIndex = this.index;
        // console.log(curIndex);
        for (let i = 0; i < btns.length; i++) {
            btns[i].classList.remove("on")
            imgs[i].classList.remove("active")
        }
        btns[curIndex].classList.add("on")
        imgs[curIndex].classList.add("active")
    }

    //左右按钮的图片切换方法
    //获取左右按钮
    let left = document.querySelector('#wrap .lrbtn').firstElementChild
    let right = document.querySelector('#wrap .lrbtn').lastElementChild
    //点击左按钮，索引减少，图片切到上一张
    left.onclick = function () {
        if (curIndex === 0) {
            curIndex = 3
        } else {
            curIndex--
        }
        for (let i = 0; i < btns.length; i++) {
            btns[i].classList.remove("on")
            imgs[i].classList.remove("active")
        }
        btns[curIndex].classList.add("on")
        imgs[curIndex].classList.add("active")
    }
    //点击右按钮，索引增加，图片切到下一张
    right.onclick = function () {
        curIndex = (++curIndex) % 4
        for (let i = 0; i < btns.length; i++) {
            btns[i].classList.remove("on")
            imgs[i].classList.remove("active")
        }
        btns[curIndex].classList.add("on")
        imgs[curIndex].classList.add("active")
    }

</script>

<script>
    // 获取父页面的window对象
    var parentWindow = window.parent;

    // 获取关闭按钮元素
    var closeButton = document.getElementById('closeButton');

    // 给关闭按钮添加点击事件的监听器
    closeButton.addEventListener('click', function () {
        // 使用父页面的window对象来关闭iframe
        parentWindow.showTable();
    });
</script>
<script>
    /**  需求：
             *  1、自动切换图片
                2、鼠标移入，图片暂停，移出，图片恢复轮播
                3、左右两个按钮，点击可以切换上一张或下一张
                4、下面的四个小圆点会随图片变颜色
                5、小圆点可以点击并切换到对应的图片上
            */

    //获取把圆点节点放置的盒子节点，即p节点
    let pEle = document.getElementsByTagName("p")[0];
    //获取事件代理的父元素section
    let secEle = document.getElementsByTagName("section")[0];

    let imgArr = [
        "./img/1.jpg",
        "./img/2.jpg",
        "./img/3.jpg",
        "./img/4.jpg",
    ]
    //获取时间函数的起始下标
    let i = 0;
    //图片有多少张，就传几个参进去，并且接收这个返回的数组
    let cirArr = creatCircle(imgArr.length);
    //遍历cirArr数组，将圆点添加进它的父节点p节点中
    cirArr.forEach(node => pEle.appendChild(node));

    //获取所有的圆点节点
    let iEle = document.getElementsByTagName("i");
    //给每一个圆点添加上自定义属性，并赋上下标
    for (let k = 0; k < iEle.length; k++) {
        iEle[k].dataset.index = k;
    }

    let timer;
    //轮播：时间函数，五分钟自动换一张
    function playTime() {
        timer = setInterval(() => {
            //循环展示图片
            i++;
            //如果已经跳到最后一张，就再次回到第一张
            if (i > imgArr.length - 1) {
                i = 0;
            }
            //给圆点添加样式，开始运行该函数
            addStyleI(i);
            //图片标签地址（src属性）
            img.src = imgArr[i];
        }, 300000);
    }
    playTime();

    // 鼠标移入，图片暂停
    secEle.addEventListener("mouseenter", function () {
        clearInterval(timer);
        timer = null;
    });
    // 鼠标移出，图片恢复滚动
    secEle.addEventListener("mouseleave", playTime);

    //给父节点绑定一个事件代理，点击左右按钮切换图片
    secEle.addEventListener("click", function (e) {
        let event = e || window.event;
        //点击左右按钮切换图片
        if (event.target.className == "left iconfont icon-anniu_jiantouxiangzuo") {
            i--;
        }
        if (event.target.className == "right iconfont icon-anniu-jiantouxiangyou") {
            i++;
        }
        if (i < 0) {
            i = imgArr.length - 1;
        }
        if (i == imgArr.length) {//3
            i = 0;
        }
        img.src = imgArr[i];
        addStyleI(i);
        //点击小圆点可以切换到对应的图片上
        if (event.target.nodeName == "I") {
            //获得点击的圆点的自定义索引值
            cirI = event.target.dataset.index;
            //替换图片
            img.src = imgArr[cirI];
            //更改圆点样式
            addStyleI(cirI);
            //每当点击小圆点，i的值就会被赋成圆点下标的值
            i = cirI;
        }
    });

    //暂停图片滚动
    function picScroll() {
        clearInterval(timer);
    }

    //生成圆点
    function creatCircle(num) {
        //创建一个空数组来接收这个圆点
        let iArr = [];
        for (let j = 0; j < num; j++) {
            //新增圆点节点
            let circleNode = document.createElement("i");
            //再把新增的圆点节点放进圆点数组中
            iArr.push(circleNode);
        }
        //完成后，返回该数组
        return iArr;
    }

    //给圆点添加样式
    function addStyleI(index) {
        //圆点的默认颜色是灰色
        [...iEle].forEach(node => node.style.backgroundColor = "gray");
        //当跳到该图片时，圆点变成白色
        iEle[index].style.backgroundColor = "white";
    }

</script>

</html>
