<!DOCTYPE html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>一些照片</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=0">
    <link rel="shortcut icon" href="home.ico">
    <style>
        @media (min-width: 0px) and (max-width:350px) {
            .div1 {
                width: 350px;
                height: 85px;
                border-radius: 8px;
                background-color: #cfe6f7;
            }
        }

        @media (min-width: 350px) and (max-width:500px) {
            .div1 {
                width: auto;
                height: 85px;
                border-radius: 8px;
                background-color: #cfe6f7;
            }
        }

        @media (min-width: 500px) {
            .div1 {
                width: 350px;
                height: 85px;
                border-radius: 8px;
                background-color: #cfe6f7;
            }
        }
    </style>
    <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_3881267_wfv3iyzbijg.css">
</head>

<body>
    <div class="div1">
        <div style="width: auto;border: 1px solid green;text-align:center;border-radius: 10px;">
            <div style="height: 60px;display: flex;align-items: center;
        justify-content: center;font-size: 30px;">
                <font style="color: #095eb3; background-color: #b3d2ee;
                border-radius: 8px;padding-left: 30px;padding-right: 30px;">一些照片</font>
            </div>
            <button onclick="javascript:history.back()" style="font-size: 20px;">◀ 返回主页</button>
            <section>
                <span class="left iconfont icon-anniu_jiantouxiangzuo"></span>
                <img src="./img/1.jpg" alt="" id="img">
                <span class="right iconfont icon-anniu-jiantouxiangyou"></span>
                <p></p>
            </section>
        </div>
</body>
<style>
    button {
        background-color: #6ab0f6;
        color: white;
        height: 40px;
        border: 0;
        font-size: 16px;
        box-sizing: content-box;
        border-radius: 8px;
    }

    button:hover {
        background-color: #5ba9f7
    }

    /* 轮播图用 */
    section {
        position: relative;
        height: 200px;
        width: auto;
        margin: 10px auto;
    }

    #img {
        height: 100%;
        width: 100%;
        background-size: 100% 100%;
    }

    p {
        position: absolute;
        left: 50%;
        bottom: 0px;
        transform: translate(-50%, -50%);
    }

    i {
        height: 15px;
        width: 15px;
        background-color: rgb(188, 188, 188);
        border-radius: 50%;
        display: inline-block;
        margin-right: 10px;
    }

    i:nth-child(1) {
        background-color: white;
    }

    i:nth-child(4) {
        margin-right: 0;
    }

    .left,
    .right {
        color: rgba(255, 254, 254, 0.7);
        font-size: 50px;
        font-weight: bolder;
        position: absolute;
        top: 50%;
        font-weight: 500;
    }

    .left {
        left: 0px;
        transform: translate(15%, -50%);
    }

    .right {
        right: 0px;
        transform: translate(-15%, -50%);
    }
</style>
<script>

</script>
<script src="./photo.js"></script>

</html>
