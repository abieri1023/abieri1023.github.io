<!DOCTYPE html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>这是我的个人主页</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=0">
    <link rel="shortcut icon" href="home.ico">
    <style>
        @media (min-width: 0px) and (max-width:380px) {
            .div1 {
                width: 380px;
                height: 65px;
                border-radius: 8px;
                background-color: #cfe6f7;
            }
        }

        @media (min-width: 380px) and (max-width:500px) {
            .div1 {
                width: auto;
                height: 65px;
                border-radius: 8px;
                background-color: #cfe6f7;
            }
        }

        @media (min-width: 500px) {
            .div1 {
                width: 380px;
                height: 65px;
                border-radius: 8px;
                background-color: #cfe6f7;
            }
        }
    </style>
</head>

<body>
    <div class="div1">
        <div id="mainDiv" style="width: auto;border: 1px solid green;text-align:center;border-radius: 10px;">
            <div style="height: 60px;display: flex;align-items: center;
        justify-content: center;font-size: 30px;">
                <font style="color: #095eb3; background-color: #b3d2ee;
                border-radius: 8px;padding-left: 30px;padding-right: 30px;" onclick="showTable()">这是我的个人主页</font>
            </div>
            <div style="height: 10px;"></div>
            <table id="myTable" style="align-content: center;width: 100%;">
                <tr>
                    <td><button onclick="openInDiv('./resume.html')">我的简历</button></td>
                    <td><button onclick="openInDiv('./memory.html')">个人自传</button></td>
                    <td><button onclick="openInDiv('./photo.html')">一些照片</button></td>
                </tr>
                <tr>
                    <td><button onclick="openInDiv('./map.html')">到此一游</button></td>
                    <td><button onclick="openInDiv('./ready.html')">未来准备</button></td>
                    <td><button onclick="openInDiv('./wish.html')">愿望列表</button></td>
                </tr>
                <tr>
                    <td><button onclick="openInDiv('./bored.html')">没有事干</button></td>
                </tr>
                <tr>
                    <td>
                        <hr><button onclick="openInDiv('./create.html')">我的创作</button>
                    </td>
                    <td>
                        <hr><button onclick="openInDiv('./good.html')">好用工具</button>
                    </td>
                    <td>
                        <hr><button onclick="openInDiv('./blank.html')">暂时空白</button>
                    </td>
                </tr>
                <tr>
                    <td>
                        <hr><button onclick="window.location.href='./index.html'">老汉上班</button>
                    </td>
                    <td>
                        <hr><button onclick="window.location.href='./heart.html'">一颗爱心</button>
                    </td>
                    <td>
                        <hr><button onclick="myIdea()">目录索引</button>
                    </td>
                </tr>
            </table>
        </div>
        <div id="myDiv"></div>


</body>
<style>
    button {
        background: linear-gradient(to bottom right, #8ec7ff, #707df0);
        color: white;
        height: 40px;
        border: 0;
        font-size: 16px;
        box-sizing: content-box;
        border-radius: 8px;
        margin-bottom: 8px;
        width: 80px;

    }

    button:hover {
        background: linear-gradient(to bottom right, #8ec7ff, #3648eb);
    }
</style>
<script>

    var table = document.getElementById("myTable");
    var div = document.getElementById("mainDiv");
    var myDiv = document.getElementById("myDiv");
    div.style.height = "70px";

    // 重新设置布局属性
    table.style.display = "table";
    table.style.width = "100%";
    table.style.height = "auto";

    // 显示表格
    table.style.visibility = "hidden";

    var iframe = document.createElement('iframe');

    function showTable() {
        if (table.style.visibility == "hidden") {
            table.style.visibility = "visible";
            div.style.height = "380px";
            iframe.parentNode.removeChild(iframe);
        } else {
            table.style.visibility = "hidden";
            div.style.height = "70px";
            if (myDiv.style.visibility == "visible") {
                myDiv.style.visibility = "hidden";
            } else {
                myDiv.style.visibility == "visible"
            }
        }

    }

    function openInDiv(src) {
        if (table.style.visibility == "hidden") {
            table.style.visibility = "visible";
        } else {
            table.style.visibility = "hidden";
        }
        div.style.height = "70px";
        iframe = document.createElement('iframe');
        iframe.src = src;
        iframe.style.width = '100%';
        iframe.style.borderRadius = '8px';
        iframe.style.border = 'none';
        iframe.style.height = '700px';
        // 等待iframe加载完成后获取内容高度
        iframe.onload = function () {
            var contentHeight = iframe.contentWindow.document.documentElement.scrollHeight;
            iframe.style.height = contentHeight * 1.1 + 'px';
        };
        document.getElementById('myDiv').appendChild(iframe);
    }

    function myIdea() {
        var inputVal = prompt("请输入内容（博客、电影、自己、看人）：");
        if(inputVal != null){
            window.open('https://github.com/abieri1023/abieri1023.github.io/blob/main/idea/'+inputVal+'.md');
        }
    }
</script>

</html>
