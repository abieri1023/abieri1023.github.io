<!DOCTYPE html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>愿望列表</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=0">
    <link rel="shortcut icon" href="home.ico">
    <style>
        @media (min-width: 0px) and (max-width:350px) {
            .div1 {
                width: 350px;
                height: 85px;
                border-radius: 8px;
                background-color: #cfe6f7;
            }
        }

        @media (min-width: 350px) and (max-width:500px) {
            .div1 {
                width: auto;
                height: 85px;
                border-radius: 8px;
                background-color: #cfe6f7;
            }
        }

        @media (min-width: 500px) {
            .div1 {
                width: 350px;
                height: 85px;
                border-radius: 8px;
                background-color: #cfe6f7;
            }
        }
    </style>
</head>

<body>
    <div class="div1">
        <div style="width: auto;border: 1px solid green;text-align:center;border-radius: 10px;">
            <div style="height: 60px;display: flex;align-items: center;
        justify-content: center;font-size: 30px;">

            </div>

                    </tr>
                    <tr>

                    </tr>

                <hr>

                <table style="width: 100%;">
                    <tr>
                        <td>1、相机</td>

                    <tr>
                        <td>3、PS游戏机</td>
                    </tr>
                </table>
                <hr>
                <strong>三、经历体验</strong><br>
                <table style="width: 100%;">
                    <tr>
                        <td>1、坐飞机</td>

                    </tr>
                    <tr>

                <hr>
                <strong>四、出行旅游</strong><br>
                <table style="width: 100%;">
                    <tr>
                        <td>1、西安兵马俑</td>
                    </tr>
                </table>
                <hr>
                <strong>五、奋斗目标</strong><br>
                <hr>
            </div>
            <!-- 这里结束 -->
        </div>
    </div>
</body>
<style>
    button {
        background-color: #6ab0f6;
        color: white;
        height: 40px;
        border: 0;
        font-size: 16px;
        box-sizing: content-box;
        border-radius: 8px;
    }

    button:hover {
        background-color: #5ba9f7
    }
</style>
<script>
    // 获取父页面的window对象
    var parentWindow = window.parent;

    // 获取关闭按钮元素
    var closeButton = document.getElementById('closeButton');

    // 给关闭按钮添加点击事件的监听器
    closeButton.addEventListener('click', function () {
        // 使用父页面的window对象来关闭iframe
        parentWindow.showTable();
    });
</script>

</html>
